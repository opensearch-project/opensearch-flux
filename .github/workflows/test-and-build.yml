name: Test and Build

on: [pull_request, push]

env:
  OPENSEARCH_DASHBOARDS_VERSION: 'main'
  PLUGIN_NAME: saved_object_migration

jobs:
  # Job 1: MCP server and CLI tests (self-contained, no OSD needed)
  mcp-server-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: '22'

      - name: Install dependencies
        run: cd src && npm ci

      - name: Build
        run: cd src && npx tsc

      - name: Run tests
        run: cd src && npx vitest run --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          flags: mcp-server
          directory: ./src
          token: ${{ secrets.CODECOV_TOKEN }}

  # Job 2: OSD plugin tests (requires full OSD checkout)
  plugin-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenSearch Dashboards
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: opensearch-project/OpenSearch-Dashboards
          ref: ${{ env.OPENSEARCH_DASHBOARDS_VERSION }}
          path: OpenSearch-Dashboards

      - name: Checkout opensearch-flux
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: opensearch-flux

      - name: Copy plugin into OSD plugins directory
        run: |
          cp -r opensearch-flux/plugins/${{ env.PLUGIN_NAME }} \
                OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}

      - name: Setup Node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version-file: './OpenSearch-Dashboards/.nvmrc'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Yarn
        shell: bash
        run: |
          YARN_VERSION=$(node -p "require('./OpenSearch-Dashboards/package.json').engines.yarn")
          echo "Installing yarn@$YARN_VERSION"
          npm i -g yarn@$YARN_VERSION

      - name: Bootstrap OSD
        uses: nick-fields/retry@14672906e672a08bd6eeb15720e9ed3ce869cdd4 # v2
        with:
          timeout_minutes: 20
          max_attempts: 2
          command: |
            cd OpenSearch-Dashboards
            yarn config set network-timeout 1000000 -g
            yarn osd bootstrap --single-version=loose

      - name: Run plugin tests
        run: |
          cd OpenSearch-Dashboards
          node scripts/jest.js --roots plugins/${{ env.PLUGIN_NAME }} --coverage --maxWorkers=100%

      - name: Upload coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          flags: osd-plugin
          directory: ./OpenSearch-Dashboards/plugins/${{ env.PLUGIN_NAME }}
          token: ${{ secrets.CODECOV_TOKEN }}
